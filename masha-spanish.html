<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Español con Masha</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#fdf6ec;--navy:#1a1a3e;--gold:#e8a020;--teal:#2a7f7f;--ok:#27ae60;--bad:#c0392b;--radius:20px;--shadow:0 8px 32px rgba(0,0,0,.15)}
html,body{height:100%;font-family:"Nunito",sans-serif;background:var(--navy);overflow:hidden}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .4s;z-index:1}
.screen.active{opacity:1;pointer-events:all;z-index:2}
#sw{background:var(--navy);overflow:hidden}
.bg-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 20% 20%,rgba(168,50,50,.28) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(42,127,127,.28) 0%,transparent 55%);animation:bgp 5s ease-in-out infinite alternate}
@keyframes bgp{from{opacity:.7}to{opacity:1}}
.stars{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.65);animation:twink var(--d,2s) ease-in-out infinite alternate}
@keyframes twink{from{opacity:.1;transform:scale(.8)}to{opacity:1;transform:scale(1.3)}}
.wc{position:relative;display:flex;flex-direction:column;align-items:center;animation:wIn .9s cubic-bezier(.34,1.56,.64,1) .3s both}
@keyframes wIn{from{opacity:0;transform:translateY(36px) scale(.9)}to{opacity:1;transform:none}}
.flags{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.flag{font-size:50px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
.flag:nth-child(1){animation:ff 3s ease-in-out infinite alternate}
.flag:nth-child(3){animation:ff 3s ease-in-out 1.5s infinite alternate}
@keyframes ff{from{transform:translateY(0) rotate(-3deg)}to{transform:translateY(-8px) rotate(3deg)}}
.hrt{font-size:26px;animation:hb 1.1s ease-in-out infinite;color:#e74c3c}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.avatar{width:108px;height:108px;border-radius:50%;border:4px solid var(--gold);box-shadow:0 0 0 8px rgba(232,160,32,.15),var(--shadow);overflow:hidden;margin-bottom:18px;background:linear-gradient(135deg,#ffdfbf,#ffc996);display:flex;align-items:center;justify-content:center;font-size:54px;animation:avIn .8s cubic-bezier(.34,1.56,.64,1) .55s both}
@keyframes avIn{from{opacity:0;transform:scale(0) rotate(-15deg)}to{opacity:1;transform:none}}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.wtitle{font-family:"Playfair Display",serif;font-size:30px;font-weight:900;color:var(--cream);text-align:center;margin-bottom:7px;text-shadow:0 2px 18px rgba(0,0,0,.5)}
.wsub{font-size:14px;color:rgba(253,246,236,.7);text-align:center;margin-bottom:4px;font-weight:600}
.wsubru{font-size:13px;color:rgba(253,246,236,.4);text-align:center;margin-bottom:28px;font-style:italic}
.btn-start{background:linear-gradient(135deg,var(--gold),#f0a030);color:var(--navy);border:none;border-radius:50px;padding:15px 46px;font-family:"Nunito",sans-serif;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 6px 22px rgba(232,160,32,.4);transition:transform .15s;margin-bottom:16px}
.btn-start:active{transform:scale(.96)}
.mode-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mode-label{font-size:12px;color:rgba(255,255,255,.5);font-weight:600}
.toggle-wrap{display:flex;background:rgba(255,255,255,.1);border-radius:20px;padding:3px;gap:2px}
.tmode{border:none;border-radius:17px;padding:5px 14px;font-family:"Nunito",sans-serif;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.55);background:transparent;transition:all .2s}
.tmode.on{background:var(--gold);color:var(--navy)}
.ltoggle{display:flex;gap:10px}
.lb{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 15px;color:rgba(255,255,255,.65);font-family:"Nunito",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.lb.on{background:rgba(255,255,255,.18);border-color:var(--gold);color:var(--gold)}
#sd{background:#f2ece4;padding:14px;justify-content:flex-start;overflow-y:auto}
.dh{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-top:6px}
.slabel{font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal)}
.pdots{display:flex;gap:6px}
.pd{width:10px;height:10px;border-radius:50%;background:#d0c8c0;transition:background .3s,transform .3s}
.pd.done{background:var(--teal)}.pd.cur{background:var(--gold);transform:scale(1.3)}
.ltsm{display:flex;gap:6px}
.lbsm{background:transparent;border:1.5px solid #ccc;border-radius:12px;padding:3px 10px;font-family:"Nunito",sans-serif;font-size:11px;font-weight:700;cursor:pointer;color:#999;transition:all .2s}
.lbsm.on{border-color:var(--teal);color:var(--teal)}
.card{width:100%;max-width:480px;background:white;border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:12px}
.card.cfx{animation:cfx .55s ease forwards}
.card.wfx{animation:wfx .45s ease forwards}
@keyframes cfx{0%{transform:scale(1)}35%{transform:scale(1.03);box-shadow:0 0 0 5px rgba(39,174,96,.25)}100%{transform:scale(1)}}
@keyframes wfx{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;background:#eee8e0;color:var(--teal);border-radius:8px;padding:3px 10px;margin-bottom:11px}
.qtext{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;line-height:1.5;color:var(--navy);margin-bottom:6px}
.blank{display:inline-block;border-bottom:3px solid var(--gold);min-width:76px;text-align:center;color:var(--gold);font-style:italic}
.hint{font-size:13px;color:#888;margin-bottom:16px;font-style:italic}
.hintru{font-size:12px;color:#aaa;margin-bottom:16px;font-style:italic;display:none}
.answer-input{width:100%;padding:14px 16px;font-family:"Nunito",sans-serif;font-size:18px;font-weight:700;border:2.5px solid #ddd;border-radius:14px;outline:none;color:var(--navy);background:#fafafa;transition:border-color .2s,background .2s;margin-bottom:10px}
.answer-input:focus{border-color:var(--teal);background:white}
.answer-input.ok{border-color:var(--ok);background:#f0fff4;color:var(--ok)}
.answer-input.bad{border-color:var(--bad);background:#fff5f5;color:var(--bad)}
.answer-input.acc{border-color:var(--gold);background:#fffbf0;color:#a07010}
.corr-row{display:none;align-items:center;gap:8px;background:#fff8ee;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.corr-row.vis{display:flex}
.corr-label{font-size:12px;color:#888;font-weight:600}
.corr-ans{font-family:"Playfair Display",serif;font-size:18px;font-weight:900;color:var(--bad)}
.check-btn{width:100%;background:var(--navy);color:var(--cream);border:none;border-radius:14px;padding:15px;font-family:"Nunito",sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:8px}
.check-btn:active{transform:scale(.98)}
.next-btn{width:100%;background:linear-gradient(135deg,var(--teal),#1a6060);color:white;border:none;border-radius:14px;padding:15px;font-family:"Nunito",sans-serif;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;display:none;margin-bottom:8px}
.next-btn.vis{display:block}
.next-btn:active{transform:scale(.98)}
.reveal-btn{width:100%;background:var(--navy);color:var(--cream);border:none;border-radius:14px;padding:15px;font-family:"Nunito",sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:10px}
.reveal-btn.rev{background:#eee8e0;color:var(--navy);font-size:18px;font-family:"Playfair Display",serif;font-weight:900;line-height:1.4;text-align:center}
.reveal-btn:disabled{cursor:default}
.rrow{display:none;gap:11px}
.rrow.vis{display:flex}
.rbtn2{flex:1;padding:13px;border:none;border-radius:14px;font-family:"Nunito",sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:transform .15s}
.rbtn2:active{transform:scale(.95)}
.rc{background:linear-gradient(135deg,#27ae60,#2ecc71);color:white;box-shadow:0 4px 14px rgba(39,174,96,.3)}
.rw{background:linear-gradient(135deg,#c0392b,#e74c3c);color:white;box-shadow:0 4px 14px rgba(192,57,43,.3)}
.helprow{display:flex;justify-content:flex-end;margin-top:10px}
.hbtn{background:transparent;border:1.5px solid #ddd;border-radius:50%;width:34px;height:34px;font-size:15px;cursor:pointer;color:#aaa;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hbtn:hover{border-color:var(--teal);color:var(--teal)}
.gpanel{display:none;background:linear-gradient(135deg,#eef7f7,#f0f8ff);border-radius:14px;padding:15px;margin-top:10px;border-left:4px solid var(--teal);animation:pIn .3s ease}
.gpanel.vis{display:block}
@keyframes pIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:none}}
.gtext{font-size:14px;color:#333;line-height:1.6;margin-bottom:10px}
.gtextru{font-size:13px;color:#555;line-height:1.6;margin-bottom:10px;font-style:italic;display:none}
.acbtn{width:100%;background:linear-gradient(135deg,var(--teal),#1a6060);color:white;border:none;border-radius:10px;padding:11px;font-family:"Nunito",sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.acbtn:disabled{opacity:.6;cursor:not-allowed}
.acresp{margin-top:10px;font-size:13px;color:#2a4a4a;line-height:1.65;background:white;border-radius:8px;padding:12px}
.acresp.ld{color:#888;font-style:italic}
.fov{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.fov.show{opacity:1;pointer-events:all}
.fov.cok{background:rgba(39,174,96,.93)}
.fov.cwrong{background:rgba(192,57,43,.93)}
.fov.cacc{background:rgba(200,140,0,.93)}
.fface{width:136px;height:136px;border-radius:50%;border:5px solid white;overflow:hidden;box-shadow:0 8px 36px rgba(0,0,0,.3);margin-bottom:18px;background:linear-gradient(135deg,#ffdfbf,#ffc996);display:flex;align-items:center;justify-content:center;font-size:68px;animation:fpop .4s cubic-bezier(.34,1.56,.64,1) both}
@keyframes fpop{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.fface img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.fmsg{font-family:"Playfair Display",serif;font-size:28px;font-weight:900;color:white;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.3);margin-bottom:5px;animation:ms .4s ease .15s both}
.fmsub{font-size:14px;color:rgba(255,255,255,.85);text-align:center;animation:ms .4s ease .25s both}
@keyframes ms{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
#sdn{background:var(--navy)}
.dnc{text-align:center;animation:wIn .7s ease both}
.dntitle{font-family:"Playfair Display",serif;font-size:34px;font-weight:900;color:var(--cream);margin-bottom:7px}
.dnsub{font-size:14px;color:rgba(253,246,236,.6);margin-bottom:5px}
.dnsubru{font-size:12px;color:rgba(253,246,236,.35);font-style:italic;margin-bottom:28px}
.stats{background:rgba(255,255,255,.07);border-radius:16px;padding:18px 30px;margin-bottom:26px;display:flex;gap:30px;justify-content:center}
.stn{font-family:"Playfair Display",serif;font-size:40px;font-weight:900;color:var(--gold)}
.stl{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.btn-again{background:linear-gradient(135deg,var(--teal),#1a6060);color:white;border:none;border-radius:50px;padding:13px 36px;font-family:"Nunito",sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-right:10px;box-shadow:0 5px 20px rgba(42,127,127,.4)}
.btn-home{background:rgba(255,255,255,.1);color:rgba(255,255,255,.65);border:1.5px solid rgba(255,255,255,.2);border-radius:50px;padding:13px 24px;font-family:"Nunito",sans-serif;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="sw" class="screen active">
  <div class="bg-glow"></div>
  <div class="stars" id="stars"></div>
  <div class="wc">
    <div class="flags">
      <span class="flag">&#127479;&#127482;</span>
      <span class="hrt">&#9829;</span>
      <span class="flag">&#127466;&#127480;</span>
    </div>
    <div class="avatar" id="avatar-el">&#129489;</div>
    <h1 class="wtitle" id="wtitle">Hola, Masha &#128062;</h1>
    <p class="wsub" id="wsub">Tu espa&ntilde;ol, cada d&iacute;a un poco mejor.</p>
    <p class="wsubru" id="wsubru">Твой испанский, каждый день чуть лучше.</p>
    <button class="btn-start" id="btnstart" onclick="startSession()">&#161;Empezamos! &#8594;</button>
    <div class="mode-row">
      <span class="mode-label" id="modelabel">Modo:</span>
      <div class="toggle-wrap">
        <button class="tmode on" id="tm-type" onclick="setMode('type')">&#9998; Escribir</button>
        <button class="tmode" id="tm-rate" onclick="setMode('rate')">&#10003; S&eacute;/No s&eacute;</button>
      </div>
    </div>
    <div class="ltoggle">
      <button class="lb on" id="wles" onclick="setLang('es')">ES</button>
      <button class="lb" id="wlru" onclick="setLang('ru')">RU</button>
    </div>
  </div>
</div>
<div id="sd" class="screen">
  <div class="dh">
    <span class="slabel" id="slabel">Sesi&oacute;n de hoy</span>
    <div class="pdots" id="pdots"></div>
    <div class="ltsm">
      <button class="lbsm on" id="dles" onclick="setLang('es')">ES</button>
      <button class="lbsm" id="dlru" onclick="setLang('ru')">RU</button>
    </div>
  </div>
  <div class="card" id="card">
    <span class="badge" id="badge">Verbo</span>
    <p class="qtext" id="qtext"></p>
    <p class="hint" id="hint"></p>
    <p class="hintru" id="hintru"></p>
    <div id="type-section">
      <input class="answer-input" id="answer-input" type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="Escribe tu respuesta..."
        onkeydown="if(event.key==='Enter')checkAnswer()">
      <div class="corr-row" id="corr-row">
        <span class="corr-label" id="corr-label">Correcto:</span>
        <span class="corr-ans" id="corr-ans"></span>
      </div>
      <button class="check-btn" id="check-btn" onclick="checkAnswer()">Comprobar</button>
      <button class="next-btn" id="next-btn" onclick="nextQ()">Siguiente &#8594;</button>
    </div>
    <div id="rate-section" style="display:none">
      <button class="reveal-btn" id="rbtn" onclick="reveal()">Ver respuesta</button>
      <div class="rrow" id="rrow">
        <button class="rbtn2 rc" id="btnc" onclick="rate(true)">&#10003; Lo sab&iacute;a</button>
        <button class="rbtn2 rw" id="btnw" onclick="rate(false)">&#10007; No lo sab&iacute;a</button>
      </div>
    </div>
    <div class="helprow"><button class="hbtn" onclick="toggleG()">&#10067;</button></div>
    <div class="gpanel" id="gpanel">
      <p class="gtext" id="gtext"></p>
      <p class="gtextru" id="gtextru"></p>
      <button class="acbtn" id="acbtn" onclick="askClaude()">&#10024; <span id="aclabel">Pregunta a Claude</span></button>
      <div class="acresp" id="acresp" style="display:none"></div>
    </div>
  </div>
</div>
<div class="fov" id="fov">
  <div class="fface" id="fface">🐶</div>
  <div class="fmsg" id="fmsg"></div>
  <div class="fmsub" id="fmsub"></div>
</div>
<div id="sdn" class="screen">
  <div class="dnc">
    <div style="font-size:52px;margin-bottom:14px">&#128062;</div>
    <h2 class="dntitle" id="dntitle">&#161;Sesi&oacute;n completa!</h2>
    <p class="dnsub" id="dnsub">Hoy practicaste bien, Masha.</p>
    <p class="dnsubru">Сегодня ты хорошо поработала, Маша.</p>
    <div class="stats">
      <div><div class="stn" id="scor">0</div><div class="stl" id="scorl">correctas</div></div>
      <div><div class="stn" id="stot">0</div><div class="stl" id="stotl">total</div></div>
    </div>
    <button class="btn-again" onclick="startSession()">Otra sesi&oacute;n</button>
    <button class="btn-home" onclick="goHome()">&#127968;</button>
  </div>
</div>
<script>
var IMG_RUFUS="",IMG_DOG_HAPPY="",IMG_DOG_WRONG="";
(function(){if(IMG_RUFUS){var e=document.getElementById("avatar-el");e.innerHTML='<img src="'+IMG_RUFUS+'" alt="">';} })();
var mode="type";
function setMode(m){mode=m;document.getElementById("tm-type").classList.toggle("on",m==="type");document.getElementById("tm-rate").classList.toggle("on",m==="rate");}
var lang="es";
var T={
es:{slabel:"Sesión de hoy",modelabel:"Modo:",tmt:"✒ Escribir",tmr:"✓ Sé/No sé",
  placeholder:"Escribe tu respuesta...",check:"Comprobar",next:"Siguiente →",
  reveal:"Ver respuesta",rc:"✓ Lo sabía",rw:"✗ No lo sabía",
  corrLabel:"Correcto:",ac:"Pregunta a Claude",asking:"Pensando...",
  wtitle:"Hola, Masha",wsub:"Tu español, cada día un poco mejor.",start:"¡Empezamos! →",
  dntitle:"¡Sesión completa!",dnsub:"Hoy practicaste bien, Masha.",scorl:"correctas",stotl:"total",
  msgok:["¡Así se hace!","¡Perfecto!","¡Muy bien!","¡Fantástico!"],
  msgacc:["¡Casi! El acento...","Falta el acento — pero ibas bien"],
  msgbad:["Casi, casi...","Sigue intentando","No pasa nada","La próxima vez"],
  subOk:"Excelente",subAcc:"Buen intento",subBad:"Lo aprenderás"},
ru:{slabel:"Сегодняшнее занятие",modelabel:"Режим:",tmt:"✒ Писать",tmr:"✓ Знаю/Не знаю",
  placeholder:"Напиши ответ...",check:"Проверить",next:"Дальше →",
  reveal:"Показать ответ",rc:"✓ Знала",rw:"✗ Не знала",
  corrLabel:"Правильно:",ac:"Спросить Claude",asking:"Думаю...",
  wtitle:"Привет, Маша",wsub:"Твой испанский, каждый день лучше.",start:"Начнём! →",
  dntitle:"Занятие завершено!",dnsub:"Сегодня ты хорошо поработала.",scorl:"верных",stotl:"всего",
  msgok:["Молодец!","Отлично!","Так держать!","Браво!"],
  msgacc:["Почти! Ударение...","Good, check the accent"],
  msgbad:["Почти...","Продолжай","Всё получится","В следующий раз"],
  subOk:"Отлично",subAcc:"Неплохо",subBad:"Скоро выучишь"}
};
function setLang(l){lang=l;["wles","dles"].forEach(function(id){var e=document.getElementById(id);if(e)e.classList.toggle("on",l==="es");});["wlru","dlru"].forEach(function(id){var e=document.getElementById(id);if(e)e.classList.toggle("on",l==="ru");});applyLang();if(curQ)renderQ();}
function applyLang(){var t=T[lang];st("slabel",t.slabel);st("modelabel",t.modelabel);st("tm-type",t.tmt);st("tm-rate",t.tmr);st("check-btn",t.check);st("next-btn",t.next);st("aclabel",t.ac);st("btnstart",t.start);st("wtitle",t.wtitle);st("wsub",t.wsub);st("dntitle",t.dntitle);st("dnsub",t.dnsub);st("scorl",t.scorl);st("stotl",t.stotl);st("corr-label",t.corrLabel);st("rbtn",t.reveal);st("btnc",t.rc);st("btnw",t.rw);var inp=document.getElementById("answer-input");if(inp)inp.placeholder=t.placeholder;var e=document.getElementById("wsubru");if(e)e.style.display=lang==="es"?"block":"none";var hr=document.getElementById("hintru");if(hr)hr.style.display=lang==="ru"?"block":"none";var gt=document.getElementById("gtext"),gtr=document.getElementById("gtextru");if(gt&&gtr){gt.style.display=lang==="ru"?"none":"block";gtr.style.display=lang==="ru"?"block":"none";}}
function st(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function norm(s){return s.trim().toLowerCase().replace(/á/g,"a").replace(/é/g,"e").replace(/í/g,"i").replace(/ó/g,"o").replace(/ú/g,"u").replace(/ñ/g,"n").replace(/[^a-z0-9\/ ]/g,"");}
function normFull(s){return s.trim().toLowerCase().replace(/[^a-záéíóúñ\/ ]/g,"");}
var QS=[

function getSRS(){try{return JSON.parse(localStorage.getItem("masha_srs4")||"{}");}catch(e){return {};}}
function saveSRS(s){try{localStorage.setItem("masha_srs4",JSON.stringify(s));}catch(e){}}
function updateSRS(i,ok){var s=getSRS(),d=s[i]||{iv:0,ef:2.5,reps:0};if(ok){d.reps++;d.iv=d.reps===1?1:d.reps===2?3:Math.round(d.iv*d.ef);d.ef=Math.min(d.ef+0.1,3);}else{d.reps=0;d.iv=0;d.ef=Math.max(d.ef-0.3,1.3);}d.nr=Date.now()+d.iv*86400000;s[i]=d;saveSRS(s);}
function getQueue(){var s=getSRS(),now=Date.now(),due=[],nd=[];QS.forEach(function(_,i){var d=s[i];(!d||d.nr<=now)?due.push(i):nd.push(i);});shuf(due);shuf(nd);return due.concat(nd).slice(0,7);}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
var queue=[],qi=0,correct=0,curQ=null,curQi=null,answered=false;
function startSession(){queue=getQueue();qi=0;correct=0;answered=false;show("sd");renderDots();loadQ();applyLang();}
function renderDots(){var pd=document.getElementById("pdots");pd.innerHTML="";queue.forEach(function(_,i){var d=document.createElement("div");d.className="pd"+(i===0?" cur":"");d.id="pd"+i;pd.appendChild(d);});}
function updDots(){queue.forEach(function(_,i){var d=document.getElementById("pd"+i);if(!d)return;d.className="pd"+(i<qi?" done":i===qi?" cur":"");});}
function loadQ(){answered=false;curQi=queue[qi];curQ=QS[curQi];document.getElementById("type-section").style.display=mode==="type"?"block":"none";document.getElementById("rate-section").style.display=mode==="rate"?"block":"none";renderQ();document.getElementById("gpanel").classList.remove("vis");document.getElementById("acresp").style.display="none";document.getElementById("acbtn").disabled=false;st("aclabel",T[lang].ac);}
function renderQ(){var q=curQ;st("badge",lang==="ru"?q.typeRu:q.type);document.getElementById("qtext").innerHTML=q.q.replace("___","<span class=\"blank\">___</span>");st("hint",q.he);var hr=document.getElementById("hintru");hr.textContent=q.hr;hr.style.display=lang==="ru"?"block":"none";var inp=document.getElementById("answer-input");inp.value="";inp.className="answer-input";inp.disabled=false;inp.placeholder=T[lang].placeholder;document.getElementById("corr-row").classList.remove("vis");var cb=document.getElementById("check-btn");cb.style.display="block";cb.disabled=false;st("check-btn",T[lang].check);document.getElementById("next-btn").classList.remove("vis");var rb=document.getElementById("rbtn");rb.className="reveal-btn";rb.textContent=T[lang].reveal;rb.disabled=false;document.getElementById("rrow").classList.remove("vis");st("btnc",T[lang].rc);st("btnw",T[lang].rw);var gt=document.getElementById("gtext"),gtr=document.getElementById("gtextru");gt.textContent=q.ge;gtr.textContent=q.gr;gt.style.display=lang==="ru"?"none":"block";gtr.style.display=lang==="ru"?"block":"none";}
function checkAnswer(){if(answered)return;var inp=document.getElementById("answer-input");var typed=inp.value.trim();if(!typed)return;var q=curQ;var tn=norm(typed),an=norm(q.ans);var altOk=q.ansAlt&&q.ansAlt.some(function(a){return norm(a)===tn;});var exact=(normFull(typed)===normFull(q.ans));var accentOnly=(tn===an)&&!exact&&!altOk;var isOk=exact||altOk;answered=true;updateSRS(curQi,isOk||accentOnly);if(isOk)correct++;inp.disabled=true;document.getElementById("check-btn").style.display="none";document.getElementById("next-btn").classList.add("vis");if(isOk){inp.className="answer-input ok";showFeedback("ok");}else if(accentOnly){inp.className="answer-input acc";st("corr-ans",q.ans);document.getElementById("corr-row").classList.add("vis");showFeedback("accent");}else{inp.className="answer-input bad";st("corr-ans",q.ans);document.getElementById("corr-row").classList.add("vis");showFeedback("wrong");}var card=document.getElementById("card");card.classList.add(isOk||accentOnly?"cfx":"wfx");setTimeout(function(){card.classList.remove("cfx","wfx");},600);}
function reveal(){if(answered)return;var rb=document.getElementById("rbtn");rb.classList.add("rev");rb.innerHTML=curQ.qa;rb.disabled=true;document.getElementById("rrow").classList.add("vis");}
function rate(ok){if(answered)return;answered=true;updateSRS(curQi,ok);if(ok)correct++;var card=document.getElementById("card");card.classList.add(ok?"cfx":"wfx");setTimeout(function(){card.classList.remove("cfx","wfx");},600);showFeedback(ok?"ok":"wrong");}
function showFeedback(result){var ov=document.getElementById("fov"),t=T[lang];var isOk=result==="ok",isAcc=result==="accent";var msgs=isOk?t.msgok:isAcc?t.msgacc:t.msgbad;st("fmsg",msgs[Math.floor(Math.random()*msgs.length)]);st("fmsub",isOk?t.subOk:isAcc?t.subAcc:t.subBad);var ff=document.getElementById("fface");if(isOk&&IMG_DOG_HAPPY)ff.innerHTML='<img src="'+IMG_DOG_HAPPY+'" alt="">';else if(!isOk&&!isAcc&&IMG_DOG_WRONG)ff.innerHTML='<img src="'+IMG_DOG_WRONG+'" alt="">';else ff.textContent=isOk?'🐶':isAcc?'🐾':'😕';ov.className="fov show "+(isOk?"cok":isAcc?"cacc":"cwrong");playSound(isOk||isAcc);setTimeout(function(){ov.className="fov";if(mode==="rate")nextQ();},1400);}
function nextQ(){qi++;if(qi>=queue.length){showDone();return;}updDots();loadQ();}
function showDone(){st("scor",""+correct);st("stot",""+queue.length);st("dntitle",T[lang].dntitle);st("dnsub",T[lang].dnsub);st("scorl",T[lang].scorl);st("stotl",T[lang].stotl);show("sdn");}
function goHome(){show("sw");}
function toggleG(){document.getElementById("gpanel").classList.toggle("vis");}
async function askClaude(){var btn=document.getElementById("acbtn"),resp=document.getElementById("acresp"),q=curQ;btn.disabled=true;st("aclabel",T[lang].asking);resp.style.display="block";resp.className="acresp ld";resp.textContent=lang==="ru"?"Думаю...":"Pensando...";var prompt=lang==="ru"?"Объясни кратко (3-4 предложения на русском) грамматику:\nУпр.: \""+q.q+"\"\nОтв.: \""+q.ans+"\"":"Explica brevemente (3-4 oraciones) la gramática:\nEjercicio: \""+q.q+"\"\nRespuesta: \""+q.ans+"\"";try{var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});var data=await r.json();var txt=data.content&&data.content.find(function(b){return b.type==="text";});resp.className="acresp";resp.textContent=txt?txt.text:"—";}catch(e){resp.className="acresp";resp.textContent=lang==="ru"?"Не удалось.":"No se pudo obtener respuesta.";}btn.disabled=false;st("aclabel",T[lang].ac);}
function playSound(ok){try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);if(ok){o.frequency.setValueAtTime(523,ctx.currentTime);o.frequency.setValueAtTime(659,ctx.currentTime+0.1);o.frequency.setValueAtTime(784,ctx.currentTime+0.2);}else{o.frequency.setValueAtTime(330,ctx.currentTime);o.frequency.setValueAtTime(250,ctx.currentTime+0.15);}g.gain.setValueAtTime(0.12,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);o.start(ctx.currentTime);o.stop(ctx.currentTime+0.5);}catch(e){}}
function show(id){document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});document.getElementById(id).classList.add("active");}
(function(){var c=document.getElementById("stars");for(var i=0;i<55;i++){var s=document.createElement("div");s.className="star";s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";s.style.setProperty("--d",(1.5+Math.random()*3)+"s");s.style.animationDelay=(Math.random()*5)+"s";c.appendChild(s);}})();
